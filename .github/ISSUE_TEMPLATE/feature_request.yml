name: Feature request
description: Suggest an idea or improvement
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What problem does this solve, or what would you like to achieve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine this working (optional).
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Workflow, mockups, or references (optional).
    validations:
      required: false
