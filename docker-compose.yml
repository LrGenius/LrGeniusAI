# geniusai-server using the published GHCR image (same backend as a GitHub release).
# Tag format matches CI: <release-tag>-x64 or <release-tag>-aarch64
# (see .github/workflows/build.yml → build-docker-images).
#
# Stop:  docker compose down
# Logs:  docker compose logs -f geniusai-server

services:
  geniusai-server:
    image: ghcr.io/lrgenius/lrgeniusai:latest
    container_name: geniusai-server
    restart: unless-stopped
    ports:
      - "19819:19819"
    volumes:
      - ./data:/data
      - ./models:/models
      - ./gcloud:/root/.config/gcloud
    environment:
      - GENIUSAI_HOST=0.0.0.0
      - GENIUSAI_PORT=19819
      - CLOUDSDK_CONFIG=/root/.config/gcloud

      - GENIUSAI_FACES_CLUSTER_ENABLED=true
      - GENIUSAI_FACES_CLUSTER_INTERVAL=3600
      - GENIUSAI_FACES_CLUSTER_DISTANCE=0.5
      - GENIUSAI_FACES_CLUSTER_MIN_FACES=3
      - GENIUSAI_FACES_CLUSTER_LINKAGE=complete

      - GENIUSAI_BACKUP_ENABLED=true
      - GENIUSAI_BACKUP_INTERVAL=86400
      - GENIUSAI_BACKUP_MAX_KEEP=14
