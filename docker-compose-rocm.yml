# geniusai-server — ROCm build (AMD GPU, experimental).
#
# Accelerates CLIP-based image search and indexing via AMD GPU.
# Not recommended when running a local LLM at the same time — both will compete for VRAM.
#
# Requirements: AMD GPU + ROCm drivers installed on the host.
#   https://rocm.docs.amd.com/projects/install-on-linux/en/latest/
#
# Image: :latest-rocm (amd64, published on each release tag).
# Override image in .env, e.g. LRGENIUS_IMAGE=ghcr.io/lrgenius/lrgeniusai:v1.2.3-x64-rocm
#
# Start: docker compose -f docker-compose-rocm.yml up -d
# Stop:  docker compose -f docker-compose-rocm.yml down
# Logs:  docker compose -f docker-compose-rocm.yml logs -f geniusai-server

services:
  geniusai-server:
    image: ${LRGENIUS_IMAGE:-ghcr.io/lrgenius/lrgeniusai:latest-rocm}
    container_name: geniusai-server
    restart: unless-stopped
    ports:
      - "19819:19819"
    volumes:
      - ./data:/data
      - ./models:/models
      - ./gcloud:/root/.config/gcloud
    environment:
      - GENIUSAI_HOST=0.0.0.0
      - GENIUSAI_PORT=19819
      - CLOUDSDK_CONFIG=/root/.config/gcloud

      - GENIUSAI_FACES_CLUSTER_ENABLED=true
      - GENIUSAI_FACES_CLUSTER_INTERVAL=3600
      - GENIUSAI_FACES_CLUSTER_DISTANCE=0.5
      - GENIUSAI_FACES_CLUSTER_MIN_FACES=3
      - GENIUSAI_FACES_CLUSTER_LINKAGE=complete

      - GENIUSAI_BACKUP_ENABLED=true
      - GENIUSAI_BACKUP_INTERVAL=86400
      - GENIUSAI_BACKUP_MAX_KEEP=14
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
